<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->
    <link rel="icon" type="image/png" sizes="32x32" href="/src/assets/favicon-32x32.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <script type="module" src="src/js/index.js"></script>
    <title>Mr.Brian Design</title>
    <link rel="stylesheet" href="src/css/index.css">
</head>

<body>
    <main class="grid grid-columns place-content-center container desktop-p">

        <div class=" flex flex-column text-center flex-center bg-purple-500 text-white radius-sm px-300 py-400 col-2 tablet-p-400 section1 animate">
            <img src="LOGO.png" alt="Mr. Brian Design Logo">
            <p class="text">I'm Keepin' it Creative</p>
        </div>

        <div class="bg-white p-300 radius-sm flex flex-column section2 animate">
            <h2 class="text-200 tablet-mt-auto">little world</h2>
        </div>

        <div class="bg-yellow-500 p-300 radius-sm overflow-hidden section3 animate">
            <h2 class="text-200 mb-200 ">pixel world</h2>
        </div>

        <div class="bg-purple-100 p-400 radius-sm flex flex-column flex-center col-2 section4 overflow-hidden desktop-block animate">
            <h2 class="mb-300 text-200">educational design</h2>
            <p class="text-center max-w-1--2 desktop-texl-left desktop-w-full">funky + fun educational content
                for classrooms and home edutainment </p>
        </div>

        <div class="p-300 bg-purple-500 radius-sm flex flex-column flex-center tablet-flex-row tablet-flex-evenly col-2 section6 animate">
            <h2 class="text-white text-150 text-center max-w-1--2 desktop-texl-left">works
            </h2>
        </div>

        <div class="bg-white p-300 radius-sm flex flex-column flex-center tablet-flex-row tablet-flex-evenly col-2 section5 desktop-flex-column animate">
            <div>
                <span class="text-100 mb-200 block">AR + XR</span>
                <h2 class="text-300 mb-300"> mind-blowing,augmented + mixed reality experiences</h2>
            </div>
        </div>

        <div class="bg-yellow-100 radius-sm p-400 flex flex-column align-center create section7 animate">
            <h2 class="text-150 mb-300">about
            </h2>
        </div>

        <div class="bg-yellow-500 p-400 radius-sm section8 flex flex-center animate">
            <h2 class="text-150 mb-300" style="font-size: 200%; font-weight: bold;">3D</h2>
        </div>

        <div class="bg-white p-300 radius-sm flex flex-column flex-center text-center section9 p-300 animate">
            <h2>exhibitions</h2>
        </div>

        <div class="bg-purple-100 p-400 radius-sm flex flex-column flex-center text-center section10 p-300 animate">
            <h2>web3</h2>
        </div>

        <div class="bg-yellow-500 p-300 radius-sm overflow-hidden flex flex-column flex-center text-center section11 p-300 animate">
            <h2>contact</h2>
        </div>

    </main>
</body>

</html>
